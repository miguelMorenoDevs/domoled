<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating Spotify...</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white h-screen flex flex-col items-center justify-center font-sans">

    <div class="flex flex-col items-center max-w-md text-center p-6 bg-zinc-800 rounded-2xl shadow-2xl border border-zinc-700">
        <!-- Spotify Green Icon SVG -->
        <svg class="w-16 h-16 text-[#1DB954] mb-4 animate-pulse" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15.001 10.62 18.66 12.9c.42.18.6.78.301 1.14zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.38 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.42-1.02.599-1.559.3z"/>
        </svg>

        <h1 class="text-2xl font-bold mb-2 tracking-tight">Routing Connection...</h1>
        <p id="statusMessage" class="text-zinc-400 text-sm mb-6">Connecting Spotify back to your local network.</p>

        <!-- Loading spinner -->
        <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-solid border-[#1DB954] border-r-transparent align-[-0.125em] motion-reduce:animate-[spin_1.5s_linear_infinite]"></div>
    </div>

    <script>
        setTimeout(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');

            const statusEl = document.getElementById('statusMessage');

            if (error) {
                statusEl.innerHTML = "<span class='text-red-400'>Access was denied. Please try scanning the QR code again.</span>";
                document.querySelector('.animate-spin').style.display = 'none';
                return;
            }

            if (!code || !state) {
                statusEl.innerHTML = "<span class='text-red-400'>Error: Missing authentication parameters.</span>";
                document.querySelector('.animate-spin').style.display = 'none';
                return;
            }

            const piCallbackUrl = `http://${state}/spotify/callback?code=${code}`;
            
            statusEl.innerText = `Redirecting to local device (${state})...`;
            
            window.location.replace(piCallbackUrl);

        }, 800);
    </script>
</body>
</html>
